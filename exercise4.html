<!DOCTYPE html>
<html lang="en">   
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My simple Accessible Page</title>
  <style>

    body { font-family: 'Segoe UI', sans-serif; font-size: 16px; line-height: 1.7; }

    
    .skip-link {
      position: absolute;
      top: -60px;
      left: 12px;
      background: #0047ab;
      color: #fff;
      padding: 10px 18px;
      border-radius: 6px;
      font-weight: bold;
      background-color: green;
    }
    .skip-link:focus { top: 10px; }

    
    a:focus, button:focus, input:focus, textarea:focus {
      outline: 3px solid #ffdd00;
      outline-offset: 2px;
    }

  </style>
</head>
<body>

  
  <a class="skip-link" href="#main">Skip to main content</a>

  <nav role="navigation" aria-label="Main navigation">
    <div>MySite</div>
    <ul>
      <li><a href="HOME.html">Home</a></li>
      <li><a href="ABOUT.HTML">About</a></li>
      <li><a href="CONTACT.html">Contact</a></li>
    </ul>
  </nav>

  
  <header role="banner">
    <h1>This is the Page</h1>
    <p>This is a Pagelayout</p>

    <button aria-label="Get started with our website">Get Started</button>
  </header>

  
  <main id="main" role="main">

    <!-- RULE 4: Images must have alt text -->
    <img src="image.jpg" alt="Kobe Bryant, The Blackmamba and a Basketball Legend">

    
    <img src="background.png" alt="">

    
    <form>
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" autocomplete="name">

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" autocomplete="email">

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="4"></textarea>

      <button type="submit">Send Message</button>
    </form>

  </main>

  
  <footer role="contentinfo">
    &copy; 2020 Example SIte
  </footer>

</body>
</html>
