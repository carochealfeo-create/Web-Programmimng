<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #111; color: #eee; }

    nav {
      background: #238b20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
    }
    nav ul { list-style: none; display: flex; gap: 28px; }
    nav ul li a { color: #88d35d; text-decoration: none; }

    .hero { text-align: center; padding: 60px 20px; }
    .hero h1 { font-size: 38px; color: #fff; }
    .hero p { color: #888; margin-top: 10px; }

    .youtube {
      width: 100%;
      max-width: 720px;
      aspect-ratio: 16/9;
      border-radius: 12px;
      border: none;
      display: block;
      margin: 0 auto;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 8px;
    }

    .wide { grid-column: span 2; }
    .wide img { height: 220px; }

   
    .section { padding: 36px 32px; max-width: 1000px; margin: 0 auto; }
    h2 { font-size: 13px; text-transform: uppercase;
         letter-spacing: 3px; color: #888; margin-bottom: 20px; }


    footer {
      background: #1a1a1a;
      text-align: center;
      padding: 24px;
      color: #444;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <nav>
    <div>Alfeo's Gallery</div>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Photos</a></li>
      <li><a href="#">Videos</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1>My Gallery</h1>
    <p>check my gallery</p>
  </div>

  <div class="section">
    <h2>Featured Video</h2>

    <iframe class="youtube"
      src="https://www.youtube.com/watch?v=24jJoywJrIo&pp=ygUPa29iZSBoaWdobGlnaHRz"
      allowfullscreen>
    </iframe>

  </div>

  <div class="section">
    <h2>Photos</h2>
    <div class="gallery">
      <div><img src="download.jpg"></div>
      <div><img src="background.png"></div>
      <div><img src="jinbei.jpg"></div>
      <div><img src="image.jpg"></div>
      <div class="wide"><img src="pexel.jpg"></div>
      <div><img src="hamster.jpg"></div>
    </div>
  </div>


  <footer>&copy; Alfeo's Gallery. All rights reserved.</footer>

</body>
</html>
